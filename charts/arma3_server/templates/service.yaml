apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app }}-service
  {{- if .Values.ip }}
  annotations:
    metallb.io/loadBalancerIPs: {{ .Values.ip }}
  {{- end }}
spec:
  type: LoadBalancer
  ports:
    - name: game
      protocol: UDP
      port: {{ .Values.game_port }}
      targetPort: 2302
    - name: steam_query
      protocol: UDP
      port: {{ .Values.steam_query_port }}
      targetPort: 2303
    - name: steam_master
      protocol: UDP
      port: {{ .Values.steam_master_port }}
      targetPort: 2304
    - name: von
      protocol: UDP
      port: {{ .Values.von_port }}
      targetPort: 2304
    - name: battleye
      protocol: UDP
      port: {{ .Values.battleye_port }}
      targetPort: 2304
  selector:
    app: {{ .Values.app }}