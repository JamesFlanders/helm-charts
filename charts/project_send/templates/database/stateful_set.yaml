apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.app }}-database-stateful-set
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.app }}-database
  template:
    metadata:
      labels:
        app: {{ .Values.app }}-database
    spec:
      containers:
        - name: {{ .Values.app }}-database
          image: "mysql:{{ .Values.tag_database }}"
          ports:
            - containerPort: 3306
              name: database
              protocol: TCP
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: {{ .Values.secret_name }}
            - name: MYSQL_DATABASE
              value: projectsend
          volumeMounts:
            - name: {{ .Values.app }}-mysql-pvc
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: {{ .Values.app }}-mysql-pvc
    spec:
      accessModes:
        - "ReadWriteOnce"
      storageClassName: {{ .Values.storage_class_name }}
      resources:
        requests:
          storage: {{ .Values.storage_size_database }}