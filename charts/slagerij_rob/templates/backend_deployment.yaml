apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app }}-backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.app }}-backend
  template:
    metadata:
      labels:
        app: {{ .Values.app }}-backend
    spec:
      containers:
      - name: {{ .Values.app }}-backend
        image: "ghcr.io/jamesflanders/{{.Values.app}}-backend:{{ .Values.tag_backend }}"
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
          - name: DB_USERNAME
            valueFrom:
              secretKeyRef:
                key: username
                name: {{ .Values.secret_name }}
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                key: password
                name: {{ .Values.secret_name }}
          - name: DB_HOSTNAME
            valueFrom:
              secretKeyRef:
                key: hostname
                name: {{ .Values.secret_name }}
          - name: DB_PORT
            valueFrom:
              secretKeyRef:
                key: port
                name: {{ .Values.secret_name }}