apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app }}-service
  annotations:
    metallb.io/loadBalancerIPs: {{ .Values.ip }}
spec:
  type: LoadBalancer
  ports:
    - name: http
      protocol: TCP
      port: 9001
      targetPort: {{ .Values.port }}
  selector:
    app: {{ .Values.app }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app }}-headless-service
spec:
  clusterIP: None
  selector:
    app: {{ .Values.app }}