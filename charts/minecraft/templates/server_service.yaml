apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app }}-server-service
spec:
  type: LoadBalancer
  loadBalancerIP: {{ .Values.ip }}
  ports:
    - name: tcp
      protocol: TCP
      port: 25565
      targetPort: 25565
    - name: udp
      protocol: UDP
      port: 25565
      targetPort: 25565
  selector:
    app: {{ .Values.app }}-server