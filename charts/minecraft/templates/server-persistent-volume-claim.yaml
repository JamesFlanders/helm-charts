{{- $name := printf "%s-data-pvc" .Values.app }}
{{- if not (lookup "v1" "PersistentVolumeClaim" .Release.Namespace $name ) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.app }}-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storage_class_name }}
  resources:
    requests:
      storage: {{ .Values.storage_size }}
{{ end }}
