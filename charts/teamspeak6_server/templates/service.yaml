apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app }}-service
  {{- if .Values.ip }}
  annotations:
    metallb.io/loadBalancerIPs: {{ .Values.ip }}
  {{- end }}
spec:
  type: LoadBalancer
  ports:
    - name: voice
      protocol: UDP
      port: 9987
      targetPort: {{ .Values.voice_port }}
    - name: ftp
      protocol: UDP
      port: 30033
      targetPort: {{ .Values.ftp_port }}
  selector:
    app: {{ .Values.app }}